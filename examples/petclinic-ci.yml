# =============================================================================
# AI-engineering-workspace + petclinic — end-to-end CI/CD pipeline example.
# =============================================================================
#
# Copy this into your petclinic fork at .github/workflows/ai-review.yml, then
# register a self-hosted GitHub Actions runner on a machine that has the
# petclinic build toolchain.
#
# The workflow provisions the AI tool itself — you do NOT pre-clone it and
# there is NO AI_TOOL_PATH variable to set. The "Prepare AI tool" step clones
# (or fast-forwards) the tool into $HOME/ai-engineering-workspace and builds
# its venv. $HOME resolves to whatever user the runner runs as, so the path is
# deterministic without any per-machine configuration.
#
# What this pipeline does:
#   - On pull_request: provision the AI tool, scan + AI review (--strict gate),
#     build petclinic, start it locally, verify health-check, then generate +
#     run external e2e tests. A failed test or a tripped strict gate fails the
#     PR check.
#   - On issue_comment containing "/apply": apply the chosen review fixes and
#     commit them to the PR branch.
#
# Prerequisites on the self-hosted runner (run it as a normal user account via
# `./run.sh` — not a privileged or `runner`-system context):
#   1. Python 3.12+ and git on PATH
#   2. JDK 17+ and Maven on PATH (to build/run petclinic)
#   3. Network access to github.com and api.anthropic.com
#
# Repository secrets to set in the petclinic fork (Settings > Secrets and
# variables > Actions):
#   - ANTHROPIC_API_KEY     your Anthropic key
#   - REVIEW_ALLOWED_REPOS  e.g. "your-user/spring-petclinic-reactjs"
# Optional repository variable:
#   - ANTHROPIC_MODEL       claude-sonnet-4-6 (default) or claude-opus-4-7
#
# If your AI tool repo is not jessejia1991/ai-engineering-workspace, edit
# AI_TOOL_REPO in the two "Prepare AI tool" steps below.
# =============================================================================

name: AI Engineering Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

env:
  PETCLINIC_REPO_PATH: ${{ github.workspace }}
  GITHUB_REPO: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
  REVIEW_ALLOWED_REPOS: ${{ secrets.REVIEW_ALLOWED_REPOS }}
  REVIEW_POST_COMMENTS: 'true'
  # Base URL the external e2e tests + health-check target. petclinic-rest
  # serves its API under the /petclinic context path and an /api prefix —
  # this must match the `servers:` url in the app's openapi spec. Change it
  # if you point the pipeline at a different service.
  VERIFY_TARGET_URL: 'http://localhost:9966/petclinic/api'

jobs:
  # ---------------------------------------------------------------------------
  # CI job: AI review + build + verify against the locally-deployed petclinic.
  # ---------------------------------------------------------------------------
  review-and-verify:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    timeout-minutes: 25
    steps:
      - name: Checkout petclinic PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git diff` against base works

      # Clone-or-update the AI tool into a deterministic $HOME-relative path
      # and export AI_TOOL_PATH for the steps below. First run also creates
      # the venv; later runs reuse it. No variable, no pre-clone needed.
      - name: Prepare AI tool
        run: |
          set -e
          AI_TOOL_PATH="$HOME/ai-engineering-workspace"
          AI_TOOL_REPO="https://github.com/jessejia1991/ai-engineering-workspace.git"
          if [ -d "$AI_TOOL_PATH/.git" ]; then
            # Force-sync to origin. The clone is a CI artifact — local
            # runtime writes must never block or diverge from the remote.
            git -C "$AI_TOOL_PATH" fetch --quiet origin
            git -C "$AI_TOOL_PATH" reset --hard --quiet origin/main
          else
            git clone "$AI_TOOL_REPO" "$AI_TOOL_PATH"
          fi
          [ -d "$AI_TOOL_PATH/venv" ] || python3 -m venv "$AI_TOOL_PATH/venv"
          "$AI_TOOL_PATH/venv/bin/pip" install -q -r "$AI_TOOL_PATH/requirements.txt"
          echo "AI_TOOL_PATH=$AI_TOOL_PATH" >> "$GITHUB_ENV"

      - name: AI scan
        working-directory: ${{ env.AI_TOOL_PATH }}
        run: |
          source venv/bin/activate
          python -m cli.main scan

      # CI gate 1 — AI multi-agent review. --strict exits non-zero when a
      # must_have contract criterion is FAIL or any finding is critical.
      # continue-on-error keeps the pipeline going so build + deploy +
      # verify still run and report; the final "Pipeline gate" step turns
      # a failed review into a red check.
      - name: AI review
        id: ai_review
        continue-on-error: true
        working-directory: ${{ env.AI_TOOL_PATH }}
        run: |
          source venv/bin/activate
          python -m cli.main review --pr ${{ github.event.pull_request.number }} --post --strict

      - name: Build petclinic
        run: mvn -B package -DskipTests

      # CD gate — start the service in background, wait until the
      # health endpoint responds, then run our external e2e tests.
      - name: Start petclinic
        run: |
          nohup mvn -B spring-boot:run > /tmp/petclinic.log 2>&1 &
          echo "$!" > /tmp/petclinic.pid

      - name: Wait for petclinic ready
        working-directory: ${{ env.AI_TOOL_PATH }}
        run: |
          source venv/bin/activate
          for i in $(seq 1 30); do
            if python -m cli.main verify health-check ; then
              echo "petclinic is up"; exit 0
            fi
            echo "  (attempt $i/30) waiting 5s..."; sleep 5
          done
          echo "petclinic did not become ready in 150s"; tail -100 /tmp/petclinic.log; exit 1

      # CI gate 2 — external e2e tests. The catalog dedups against
      # already-generated tests, so this only ever costs LLM tokens for
      # APIs touched by the diff that aren't covered yet. continue-on-error
      # for the same reason as the review step — see "Pipeline gate" below.
      - name: AI verify (generate + run)
        id: ai_verify
        continue-on-error: true
        working-directory: ${{ env.AI_TOOL_PATH }}
        run: |
          source venv/bin/activate
          python -m cli.main verify generate --diff --max 3
          python -m cli.main verify run --diff

      - name: Stop petclinic
        if: always()
        run: |
          if [ -f /tmp/petclinic.pid ]; then
            kill "$(cat /tmp/petclinic.pid)" || true
          fi
          # Belt-and-suspenders for the Maven wrapper child process.
          pkill -f 'spring-boot:run' || true

      # The review + verify steps run continue-on-error, so every stage
      # above completes and reports even when a gate trips. This final
      # step is the single place the job goes red — after the whole
      # pipeline has run, not in the middle of it.
      - name: Pipeline gate
        if: always()
        run: |
          echo "AI review : ${{ steps.ai_review.outcome }}"
          echo "AI verify : ${{ steps.ai_verify.outcome }}"
          failed=0
          if [ "${{ steps.ai_review.outcome }}" = "failure" ]; then
            echo "::error::AI review gate failed (strict: must_have FAIL or critical finding)"
            failed=1
          fi
          if [ "${{ steps.ai_verify.outcome }}" = "failure" ]; then
            echo "::error::AI verify gate failed (external e2e test failures)"
            failed=1
          fi
          exit $failed

  # ---------------------------------------------------------------------------
  # AI-apply job: on PR comments containing "/apply", let the AI commit the
  # chosen review fixes to the PR branch.
  # ---------------------------------------------------------------------------
  ai-apply:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/apply')
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # GHA's default checkout fetches the PR head ref via the
          # merge-commit. For `apply` to push back to the branch we need
          # the actual head branch checked out at the head SHA.
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Prepare AI tool
        run: |
          set -e
          AI_TOOL_PATH="$HOME/ai-engineering-workspace"
          AI_TOOL_REPO="https://github.com/jessejia1991/ai-engineering-workspace.git"
          if [ -d "$AI_TOOL_PATH/.git" ]; then
            # Force-sync to origin. The clone is a CI artifact — local
            # runtime writes must never block or diverge from the remote.
            git -C "$AI_TOOL_PATH" fetch --quiet origin
            git -C "$AI_TOOL_PATH" reset --hard --quiet origin/main
          else
            git clone "$AI_TOOL_REPO" "$AI_TOOL_PATH"
          fi
          [ -d "$AI_TOOL_PATH/venv" ] || python3 -m venv "$AI_TOOL_PATH/venv"
          "$AI_TOOL_PATH/venv/bin/pip" install -q -r "$AI_TOOL_PATH/requirements.txt"
          echo "AI_TOOL_PATH=$AI_TOOL_PATH" >> "$GITHUB_ENV"

      - name: AI apply
        working-directory: ${{ env.AI_TOOL_PATH }}
        run: |
          source venv/bin/activate
          python -m cli.main apply \
            --pr ${{ github.event.issue.number }} \
            --comment-id ${{ github.event.comment.id }} \
            --target-path ${{ github.workspace }} \
            --push
